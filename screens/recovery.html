<div class="recovery-screen screen-fade-in">
  <!-- Header -->
  <div class="screen-header">
    <a href="home" data-link class="back-btn" aria-label="חזרה לדף הבית">
      <i data-lucide="arrow-right"></i>
    </a>
    <h2>תכנית התאוששות</h2>
    <div class="header-spacer"></div>
  </div>

  <div class="recovery-body">
    <!-- Progress Indicator -->
    <div class="recovery-progress-card">
      <div class="progress-info">
        <h3>התקדמות הייצוב</h3>
        <span id="recovery-percent">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="recovery-progress-bar"></div>
      </div>
      <p class="progress-tip" id="recovery-tip">סמנו את השלבים הבאים בעודכם חוזרים באיטיות לתחושת רוגע.</p>
    </div>

    <!-- Stabilization Checklist -->
    <div class="recovery-checklist" id="recovery-checklist">
      <!-- Item 1 -->
      <div class="checklist-item">
        <label class="check-label">
          <input type="checkbox" class="checklist-cb" data-index="0">
          <span class="custom-checkbox"><i data-lucide="check"></i></span>
          <span class="checklist-text">שתו כוס מים קרים</span>
        </label>
      </div>

      <!-- Item 2 -->
      <div class="checklist-item">
        <label class="check-label">
          <input type="checkbox" class="checklist-cb" data-index="1">
          <span class="custom-checkbox"><i data-lucide="check"></i></span>
          <span class="checklist-text">שטפו את הפנים או את פרקי הידיים במים קרים</span>
        </label>
      </div>

      <!-- Item 3 -->
      <div class="checklist-item">
        <label class="check-label">
          <input type="checkbox" class="checklist-cb" data-index="2">
          <span class="custom-checkbox"><i data-lucide="check"></i></span>
          <span class="checklist-text">השמיטו את הכתפיים והרפו את הלסת</span>
        </label>
      </div>

      <!-- Item 4 -->
      <div class="checklist-item">
        <label class="check-label">
          <input type="checkbox" class="checklist-cb" data-index="3">
          <span class="custom-checkbox"><i data-lucide="check"></i></span>
          <span class="checklist-text">התעטפו בשמיכה כבדה או במעיל חם</span>
        </label>
      </div>

      <!-- Item 5 -->
      <div class="checklist-item">
        <label class="check-label">
          <input type="checkbox" class="checklist-cb" data-index="4">
          <span class="custom-checkbox"><i data-lucide="check"></i></span>
          <span class="checklist-text">הכירו בכך שגל המשבר החזק ביותר כבר עבר</span>
        </label>
      </div>
    </div>

    <!-- Next Steps Navigation Links -->
    <div class="recovery-footer">
      <div class="footer-label">זקוקים לתמיכה נוספת?</div>
      <div class="recovery-shortcuts">
        <a href="breathing" class="shortcut-btn" data-link>
          <i data-lucide="wind"></i>
          <span>מרחב נשימה</span>
        </a>
        <a href="sounds" class="shortcut-btn" data-link>
          <i data-lucide="music"></i>
          <span>צלילי רקע</span>
        </a>
      </div>
    </div>
  </div>
</div>
