<div class="emergency-mode-screen">
  <div class="emergency-actions-wrapper">
    <!-- Action 1: Breathing (Primary Action) -->
    <button id="em-calm-btn" class="em-action-btn em-primary" aria-label="לעזור לי להירגע - תרגיל נשימה">
      <div class="em-icon-container">
        <svg class="em-meditation-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="5" r="2" />
          <path d="M12 7v6" />
          <path d="M5 10c1 3 3 5 7 5s6-2 7-5" />
          <path d="M3 20c2-3 5-4 9-4s7 1 9 4" />
          <path d="M6 21c3-1 9-1 12 0" />
        </svg>
      </div>
      <span class="em-btn-label">לעזור לי להירגע</span>
    </button>

    <!-- Action 2: Focus & Distraction (Secondary Action) -->
    <button id="em-focus-btn" class="em-action-btn em-secondary" aria-label="מיקוד והסחה">
      <div class="em-icon-container">
        <svg class="custom-xo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M8 10l3 4M11 10l-3 4" />
          <circle cx="15" cy="12" r="2" />
        </svg>
      </div>
      <span class="em-btn-label">מיקוד והסחה</span>
    </button>

    <!-- Action 3: Support (Tertiary Action) -->
    <button id="em-support-btn" class="em-action-btn em-tertiary" aria-label="ליצור קשר עם תמיכה - מעגל תמיכה">
      <div class="em-icon-container">
        <i data-lucide="phone"></i>
      </div>
      <span class="em-btn-label">ליצור קשר עם תמיכה</span>
    </button>
  </div>

  <!-- Exit Action with long-press visual feedback -->
  <div class="emergency-exit-container">
    <div class="em-exit-btn-wrapper" id="em-exit-wrapper">
      <button id="em-exit-btn" class="em-exit-btn" aria-label="חזרה למסך הבית (לחיצה ארוכה)">
        <span class="exit-btn-text" id="em-exit-text">חזרה למסך הבית</span>
        <svg class="exit-progress-svg" viewBox="0 0 240 54">
          <rect class="exit-progress-bg" x="1.5" y="1.5" width="237" height="51" rx="25.5" ry="25.5"></rect>
          <rect class="exit-progress-fg" x="1.5" y="1.5" width="237" height="51" rx="25.5" ry="25.5"></rect>
        </svg>
      </button>
    </div>
  </div>
</div>
