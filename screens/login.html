<div class="login-screen screen-fade-in">
  <div class="login-header">
    <div class="app-logo">
      <i data-lucide="shield-check" class="logo-icon"></i>
    </div>
    <h1>HelpP</h1>
    <p class="calm-message">קחו נשימה. אתם כאן.</p>
  </div>

  <div class="login-actions">
    <!-- Zero Cognitive Load Quick Access -->
    <button class="btn btn-primary btn-guest" id="guest-mode-btn">
      <span>להיכנס במהירות (מצב אורח)</span>
      <i data-lucide="chevron-left"></i>
    </button>
    
    <div class="divider">
      <span>או להתחבר בצורה מאובטחת</span>
    </div>

    <!-- Social Logins (Optional Placeholders) -->
    <div class="social-login-grid">
      <button class="btn btn-outline btn-social" id="login-apple">
        <i data-lucide="apple"></i>
        <span>להתחבר באמצעות Apple</span>
      </button>
      <button class="btn btn-outline btn-social" id="login-google">
        <i data-lucide="chrome"></i>
        <span>להתחבר באמצעות Google</span>
      </button>
      <button class="btn btn-outline btn-social" id="login-phone">
        <i data-lucide="phone"></i>
        <span>להתחבר באמצעות טלפון</span>
      </button>
    </div>
  </div>

  <div class="login-footer">
  </div>
</div>
