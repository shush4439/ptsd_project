<div class="support-screen screen-fade-in">
  <!-- Header -->
  <div class="screen-header">
    <a href="home" data-link class="back-btn" aria-label="חזרה לדף הבית">
      <i data-lucide="arrow-right"></i>
    </a>
    <h2>מעגל תמיכה</h2>
    <div class="header-spacer"></div>
  </div>

  <div class="support-body">
    <!-- Pinned Professional Helpline Card -->
    <div class="helpline-card">
      <div class="helpline-info">
        <div class="helpline-badge">תמיכה מקצועית</div>
        <h3>מוקד ער״ן 1201</h3>
        <p>עזרה ראשונה נפשית - חינם, דיסקרטי, זמין 24/7. בשיחה או בהודעה.</p>
      </div>
      <div class="helpline-actions">
        <button id="dial-988-btn" class="btn btn-danger btn-call">
          <i data-lucide="phone"></i>
          <span>חיוג ל-1201</span>
        </button>
        <button id="text-988-btn" class="btn btn-outline btn-text-crisis">
          <i data-lucide="message-square"></i>
          <span>הודעה ל-1201</span>
        </button>
      </div>
    </div>

    <!-- Personal Circle List -->
    <div class="circle-section">
      <div class="section-title-bar">
        <h3>מעגל הביטחון שלי</h3>
        <span class="contacts-count" id="contacts-count">0 אנשי קשר</span>
      </div>
      <div class="contacts-list" id="contacts-list-mount">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Add Contact Navigation Button -->
    <button id="add-contact-nav-btn" class="btn btn-primary">
      <i data-lucide="user-plus"></i>
      <span>הוספת איש קשר</span>
    </button>
  </div>
</div>
