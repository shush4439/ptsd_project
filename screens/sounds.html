<div class="sounds-screen screen-fade-in">
  <!-- Header -->
  <div class="screen-header">
    <a href="home" data-link class="back-btn" aria-label="חזרה לדף הבית">
      <i data-lucide="arrow-right"></i>
    </a>
    <h2>קולות מרגיעים</h2>
    <div class="header-spacer"></div>
  </div>

  <!-- Intro info -->
  <div class="sounds-intro">
    <p>השקיטו את התודעה בעזרת קולות רקע מסונתזים בזמן אמת. לחצו על צליל כדי להפעיל אותו, ולחצו שוב כדי להפסיק.</p>
  </div>

  <!-- 2x2 Grid of Sound Tiles -->
  <div class="sounds-grid">
    <!-- Rain Tile -->
    <button class="sound-tile" id="tile-rain" aria-label="מטר גשם">
      <div class="tile-icon-wrapper rain">
        <i data-lucide="cloud-rain"></i>
      </div>
      <div class="tile-info">
        <h3>מטר גשם</h3>
        <p>טיפות מרגיעות</p>
      </div>
    </button>

    <!-- Ocean Tile -->
    <button class="sound-tile" id="tile-ocean" aria-label="גלי אוקיינוס">
      <div class="tile-icon-wrapper ocean">
        <i data-lucide="waves"></i>
      </div>
      <div class="tile-info">
        <h3>גלי אוקיינוס</h3>
        <p>גלי ים עמוקים</p>
      </div>
    </button>

    <!-- Wind Tile -->
    <button class="sound-tile" id="tile-wind" aria-label="רוח קלילה">
      <div class="tile-icon-wrapper wind">
        <i data-lucide="wind"></i>
      </div>
      <div class="tile-info">
        <h3>רוח קלילה</h3>
        <p>משבי רוח שורקים</p>
      </div>
    </button>

    <!-- Binaural Beats Tile -->
    <button class="sound-tile" id="tile-binaural" aria-label="פעימות דו-אוזניות">
      <div class="tile-icon-wrapper binaural">
        <i data-lucide="headphones"></i>
      </div>
      <div class="tile-info">
        <h3>פעימות דו-אוזניות</h3>
        <p>תדר הרפיה 10Hz</p>
      </div>
    </button>
  </div>

  <div class="sounds-footer">
    <button class="btn btn-outline" id="stop-all-sounds-btn">
      <i data-lucide="square"></i>
      <span>הפסקת כל הצלילים</span>
    </button>
  </div>
</div>
