<div class="home-screen screen-fade-in">
  <!-- Calm Greeting Section -->
  <div class="home-header">
    <h1 id="home-greeting">נשמו. אתם בטוחים.</h1>
    <p class="home-subtitle">בחרו כלי מהרשימה כדי למצוא שלווה.</p>
  </div>

  <!-- 2x3 Grid Dashboard -->
  <div class="home-grid">
    
     <!-- Breathe Card -->
     <a href="breathing" class="grid-card card-breathe" data-link>
       <div class="card-icon-wrapper">
         <svg class="home-meditation-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
           <circle cx="12" cy="5" r="2" />
           <path d="M12 7v6" />
           <path d="M5 10c1 3 3 5 7 5s6-2 7-5" />
           <path d="M3 20c2-3 5-4 9-4s7 1 9 4" />
           <path d="M6 21c3-1 9-1 12 0" />
         </svg>
       </div>
       <div class="card-info">
         <h3>נשימה מודרכת</h3>
         <p>מחזורי נשימה מונחים</p>
       </div>
     </a>
 
     <!-- Grounding Card -->
     <a href="grounding" class="grid-card card-grounding" data-link>
       <div class="card-icon-wrapper">
         <i data-lucide="fingerprint"></i>
       </div>
       <div class="card-info">
         <h3>קרקוע חושי</h3>
         <p>תרגול בשיטת 5-4-3-2-1</p>
       </div>
     </a>
 
     <!-- Safe Sounds Card -->
     <a href="sounds" class="grid-card card-sounds" data-link>
       <div class="card-icon-wrapper">
         <i data-lucide="music"></i>
       </div>
       <div class="card-info">
         <h3>קולות מרגיעים</h3>
         <p>צלילי סביבה מסונתזים</p>
       </div>
     </a>
 
     <!-- Focus & Distraction Card -->
     <a href="focus" class="grid-card card-focus" data-link>
       <div class="card-icon-wrapper">
         <svg class="custom-xo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
           <circle cx="12" cy="12" r="10" />
           <path d="M8 10l3 4M11 10l-3 4" />
           <circle cx="15" cy="12" r="2" />
         </svg>
       </div>
       <div class="card-info">
         <h3>מיקוד והסחה</h3>
         <p>משחק בועות זן פופ</p>
       </div>
     </a>

    <!-- Recovery Card -->
    <a href="recovery" class="grid-card card-recovery" data-link>
      <div class="card-icon-wrapper">
        <i data-lucide="clipboard-check"></i>
      </div>
      <div class="card-info">
        <h3>התאוששות</h3>
        <p>תוכנית חזרה לשגרה</p>
      </div>
    </a>

    <!-- Support Circle Card -->
    <a href="support" class="grid-card card-support" data-link>
      <div class="card-icon-wrapper">
        <i data-lucide="users"></i>
      </div>
      <div class="card-info">
        <h3>מעגל תמיכה</h3>
        <p>חיוג מהיר לאנשי קשר</p>
      </div>
    </a>

  </div>

  <!-- Quick emergency support reminder -->
  <div class="home-footer-tip">
    <i data-lucide="alert-circle"></i>
    <span>לחצן המצוקה SOS זמין עבורכם בפינה בכל עת.</span>
  </div>
</div>
